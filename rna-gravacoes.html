<title>RNA na Prática — Painel de Produção</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0e0f;--bg2:#161618;--bg3:#1e1e21;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#f0ede8;--muted:#7a7875;--dim:#3a3835;--green:#4ade80;--green-bg:rgba(74,222,128,0.08);--green-border:rgba(74,222,128,0.2);--amber:#fbbf24;--amber-bg:rgba(251,191,36,0.08);--amber-border:rgba(251,191,36,0.2);--blue:#60a5fa;--blue-bg:rgba(96,165,250,0.08);--blue-border:rgba(96,165,250,0.2);--red:#f87171;--red-bg:rgba(248,113,113,0.08);--red-border:rgba(248,113,113,0.25);--purple:#c084fc;--purple-bg:rgba(192,132,252,0.08);--purple-border:rgba(192,132,252,0.22);--pink:#f472b6;--pink-bg:rgba(244,114,182,0.08);--pink-border:rgba(244,114,182,0.22);--radius:10px;--radius-sm:6px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:1rem 1.25rem;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.header-left{display:flex;align-items:center;gap:10px}
.logo-dot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
.header-title{font-size:15px;font-weight:700}
.header-sub{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.mode-switch{display:flex;gap:3px;background:var(--bg3);border-radius:var(--radius-sm);padding:3px}
.mode-btn{padding:5px 11px;border-radius:4px;border:none;font-size:11px;font-weight:600;font-family:'Syne',sans-serif;cursor:pointer;background:transparent;color:var(--muted);transition:all .15s}
.mode-btn.active{background:var(--bg2);color:var(--text);border:1px solid var(--border2)}
.tabs-wrap{padding:1rem 1.25rem 0;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.tabs-wrap::-webkit-scrollbar{display:none}
.tab{padding:7px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);font-size:12px;font-weight:500;font-family:'Syne',sans-serif;cursor:pointer;background:transparent;color:var(--muted);white-space:nowrap;transition:all .15s}
.tab:hover{border-color:var(--border2);color:var(--text)}
.tab.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.theme-bar{margin:.75rem 1.25rem;padding:8px 12px;border-radius:var(--radius-sm);background:var(--bg3);border-left:3px solid var(--green);font-size:12px;color:var(--muted);font-style:italic;line-height:1.5}
.progress-wrap{padding:0 1.25rem .75rem}
.progress-meta{display:flex;justify-content:space-between;margin-bottom:6px}
.progress-meta span{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.pct{color:var(--green)!important}
.pbar-bg{height:4px;background:var(--bg3);border-radius:4px;overflow:hidden}
.pbar{height:4px;background:var(--green);border-radius:4px;transition:width .4s;box-shadow:0 0 8px rgba(74,222,128,.4)}
.legend{display:flex;gap:12px;flex-wrap:wrap;padding:0 1.25rem .75rem}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.leg-dot{width:7px;height:7px;border-radius:50%}
.alerts{padding:0 1.25rem;display:flex;flex-direction:column;gap:6px;margin-bottom:.75rem}
.alert{padding:9px 12px;border-radius:var(--radius-sm);border:1px solid var(--amber-border);background:var(--amber-bg);font-size:12px;color:var(--amber);line-height:1.5}
.alert strong{font-weight:700}
.sections{padding:0 1.25rem 2rem;display:flex;flex-direction:column;gap:1rem}
.section-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace}
.items{display:flex;flex-direction:column;gap:4px}
.item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg2);cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.item:hover{border-color:var(--border2);background:var(--bg3)}
.item:active{transform:scale(.99)}
.item.done{opacity:.45}
.item.done .item-lbl{text-decoration:line-through}
.chk{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--dim);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.item.done .chk{background:var(--green);border-color:var(--green)}
.chk-icon{display:none}
.item.done .chk-icon{display:block}
.item-body{flex:1;min-width:0}
.item-lbl{font-size:13px;font-weight:500;line-height:1.4;color:var(--text)}
.item-sub{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4;font-family:'DM Mono',monospace}
.item-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.item-time{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;text-align:right}
.badge{font-size:10px;font-weight:600;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:20px;white-space:nowrap}
.badge-r{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.badge-a{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.badge-ra{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.badge-imp{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
/* EDITOR */
.editor-view{padding:0 1.25rem 2rem}
.person-header{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;padding:12px 14px;border-radius:var(--radius)}
.ph-purple{background:var(--purple-bg);border:1px solid var(--purple-border)}
.ph-pink{background:var(--pink-bg);border:1px solid var(--pink-border)}
.person-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.av-purple{background:var(--purple-bg);border:1.5px solid var(--purple-border);color:var(--purple)}
.av-pink{background:var(--pink-bg);border:1.5px solid var(--pink-border);color:var(--pink)}
.pn-purple{font-size:14px;font-weight:700;color:var(--purple)}
.pn-pink{font-size:14px;font-weight:700;color:var(--pink)}
.person-role{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.video-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;transition:border-color .15s}
.video-card:hover{border-color:var(--border2)}
.video-card-header{display:flex;align-items:center;gap:10px;padding:12px 14px}
.video-num{width:24px;height:24px;border-radius:50%;flex-shrink:0;background:var(--purple-bg);border:1px solid var(--purple-border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--purple);font-family:'DM Mono',monospace;transition:all .2s}
.video-num.pronto{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.video-title{flex:1;font-size:13px;font-weight:500;line-height:1.4}
.vstatus{font-size:10px;font-weight:600;font-family:'DM Mono',monospace;padding:3px 8px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);white-space:nowrap}
.vstatus.recebendo{background:var(--amber-bg);border-color:var(--amber-border);color:var(--amber)}
.vstatus.editando{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue)}
.vstatus.pronto{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.video-details{padding:0 14px 14px 48px}
.video-detail-row{font-size:12px;color:var(--muted);line-height:1.8;font-family:'DM Mono',monospace}
.video-detail-row span{color:var(--text)}
.status-cycle{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.sopt{font-size:10px;padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);cursor:pointer;font-family:'DM Mono',monospace;font-weight:600;transition:all .15s;-webkit-tap-highlight-color:transparent}
.sopt:hover{border-color:var(--border2);color:var(--text)}
.sopt.sel-aguardando{border-color:var(--border2);color:var(--text)}
.sopt.sel-recebendo{background:var(--amber-bg);border-color:var(--amber-border);color:var(--amber)}
.sopt.sel-editando{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue)}
.sopt.sel-pronto{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}

.photos-view{padding:0 1.25rem 2rem}
.photo-sec-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin:1rem 0 6px;padding-bottom:6px;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace}
.photo-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:4px;display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.photo-card:hover{border-color:var(--border2);background:var(--bg3)}
.photo-card:active{transform:scale(.99)}
.photo-card.done{opacity:.45}
.photo-card.done .photo-lbl{text-decoration:line-through}
.photo-lbl{flex:1;font-size:13px;font-weight:500}
.photo-chk{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--dim);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.photo-card.done .photo-chk{background:var(--green);border-color:var(--green)}
.pchk-icon{display:none}
.photo-card.done .pchk-icon{display:block}
.hidden{display:none}
</style>
</head>

    {lbl:"Credenciamento e abertura dos portões"},
    {lbl:"Verena no palco — abertura"},
    {lbl:"Palestrantes em ação (Jonathas, Rafael)"},
    {lbl:"Alunos atentos / anotando"},
    {lbl:"Cerimônia de premiação"},
    {lbl:"Painel com alunos premiados"},
    {lbl:"Trend parte 1 — alunos gravando"},
  ]},
  {title:"24/04 · Dia 2",photos:[
    {lbl:"Abertura e recepção"},
    {lbl:"Palestras — Rafael e Jonathas"},
    {lbl:"Break de vendas — alunos nas mesas"},
    {lbl:"Lazer Coach — aluno + Rafael no palco"},
  ]},
  {title:"25/04 · Dia 3",photos:[
    {lbl:"Lazer Coach 2 — Rafael + aluno"},
    {lbl:"Celebração MNA — camisetas no palco"},
    {lbl:"Foto em grupo dos alunos MNA"},
    {lbl:"Encerramento — Verena + time"},
    {lbl:"Trend parte 2 — conclusão"},
  ]},
];

// State
let saved; try{saved=JSON.parse(localStorage.getItem(STORAGE_KEY));}catch(e){}
let gState=saved?.g||days.map(d=>d.sections.map(s=>s.items.map(i=>i.done_default||false)));
let eState=saved?.e||videos.map(()=>'aguardando');
let pState=saved?.p||photoSections.map(s=>s.photos.map(p=>p.d||false));
function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify({g:gState,e:eState,p:pState}));}catch(e){}}

let curDay=0,curMode='gravacao';

function renderGravacao(){
  const d=days[curDay],s=gState[curDay];
  document.getElementById('theme-bar').textContent=d.theme;
  let tot=0,dn=0;
  s.forEach(sec=>sec.forEach(v=>{tot++;if(v)dn++;}));
  const pct=tot?Math.round(dn/tot*100):0;
  document.getElementById('prog-label').textContent=dn+' de '+tot+' concluídos';
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('pbar').style.width=pct+'%';
  document.getElementById('alerts').innerHTML=d.alerts.map(a=>'<div class="alert"><strong>Lembrete:</strong> '+a+'</div>').join('');
  let html='';
  d.sections.forEach((sec,si)=>{
    html+='<div class="section"><div class="section-title">'+sec.title+'</div><div class="items">';
    sec.items.forEach((item,ii)=>{
      const isDone=s[si][ii];
      let bC='badge-r',bL='Richard';
      if(item.imp){bC='badge-imp';bL='Urgente';}
      else if(item.resp==='a'){bC='badge-a';bL='Ana';}
      else if(item.resp==='ra'){bC='badge-ra';bL='Ambos';}
      html+='<div class="item'+(isDone?' done':'')+'" onclick="toggleG('+si+','+ii+')">'
        +'<div class="chk"><span class="chk-icon">'+CHECK+'</span></div>'
        +'<div class="item-body"><div class="item-lbl">'+item.lbl+'</div>'+(item.sub?'<div class="item-sub">'+item.sub+'</div>':'')+'</div>'
        +'<div class="item-right"><span class="item-time">'+(item.time||'')+'</span><span class="badge '+bC+'">'+bL+'</span></div>'
        +'</div>';
    });
    html+='</div></div>';
  });
  document.getElementById('sections').innerHTML=html;
}

function toggleG(si,ii){gState[curDay][si][ii]=!gState[curDay][si][ii];save();renderGravacao();}
function switchDay(d){curDay=d;document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===d));window.scrollTo({top:0,behavior:'smooth'});renderGravacao();}

function renderEdicao(){
  const sLabels={aguardando:'aguardando',recebendo:'recebendo material',editando:'editando',pronto:'pronto'};
  let html='';
  videos.forEach((v,i)=>{
    const st=eState[i];
    html+='<div class="video-card">'
      +'<div class="video-card-header">'
      +'<div class="video-num'+(st==='pronto'?' pronto':'')+'">'+(i+1)+'</div>'
      +'<div class="video-title">'+v.title+'</div>'
      +'<div class="vstatus '+st+'">'+sLabels[st]+'</div>'
      +'</div>'
      +'<div class="video-details">'
      +'<div class="video-detail-row">Material: <span>'+v.sub+'</span></div>'
      +'<div class="video-detail-row">Dia ref: <span>'+v.day+'</span></div>'
      +'<div class="status-cycle">'
      +['aguardando','recebendo','editando','pronto'].map(s=>'<div class="sopt'+(eState[i]===s?' sel-'+s:'')+'" onclick="setVS('+i+',\''+s+'\')">'+s+'</div>').join('')
      +'</div></div></div>';
  });
  document.getElementById('video-cards').innerHTML=html;
}
function setVS(i,st){eState[i]=st;save();renderEdicao();}

function renderFotos(){
  let html='';
  photoSections.forEach((sec,si)=>{
    html+='<div class="photo-sec-title">'+sec.title+'</div>';
    sec.photos.forEach((p,pi)=>{
      const isDone=pState[si][pi];
      html+='<div class="photo-card'+(isDone?' done':'')+'" onclick="toggleP('+si+','+pi+')">'
        +'<div class="photo-lbl">'+p.lbl+'</div>'
        +'<div class="photo-chk"><span class="pchk-icon">'+CHECK+'</span></div>'
        +'</div>';
    });
  });
  document.getElementById('photo-cards').innerHTML=html;
}
function toggleP(si,pi){pState[si][pi]=!pState[si][pi];save();renderFotos();}

function setMode(mode){
  curMode=mode;
  document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active',['gravacao','edicao','fotos'][i]===mode));
  document.getElementById('mode-gravacao').classList.toggle('hidden',mode!=='gravacao');
  document.getElementById('mode-edicao').classList.toggle('hidden',mode!=='edicao');
  document.getElementById('mode-fotos').classList.toggle('hidden',mode!=='fotos');
  window.scrollTo({top:0,behavior:'smooth'});
  if(mode==='edicao')renderEdicao();
  if(mode==='fotos')renderFotos();
}

renderGravacao();
</script>
</body>
</html>
